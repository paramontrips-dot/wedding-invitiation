<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shraab & Daab | The Union</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style-premium.css">
</head>
<body>

    <div class="caricature-container" id="caricaturePreview">
        <img src="caricature.png" alt="Couple Caricature">
    </div>

    <div class="envelope-wrapper" id="envelopeWrapper">
        
        <div class="envelope-front">
            <div class="open-btn" id="openBtn"></div>
        </div>

        <div class="invitation-card">
            
            <div class="card-header">
                <p class="request-text">Request the honor of your presence</p>
            </div>

            <div class="card-names">
                <h1 class="names">Shraab</h1>
                <span class="ampersand">&</span>
                <h1 class="names">Daab</h1>
            </div>

            <div class="card-body">
                <p class="poetic-invite">
                    Together with their families, they invite you to witness the<br>solemn promises of love and devotion.
                </p>

                <div class="details-grid">
                    <div class="detail-item">May 13, 2026</div>
                    <div class="detail-divider"></div>
                    <div class="detail-item">Muhurtham <br> 6:51 AM</div> 
                </div>

                <div class="location-suite">
                    <span class="venue-name">Raaga Convention</span><br>
                    Survey No-756, Gandipet, Janwada<br>
                    Hyderabad, Telangana 500075
                </div>
            </div>

            <div class="action-buttons">
                <a href="https://maps.google.com/..." class="map-link" target="_blank" rel="noopener noreferrer">View Location</a>
                <button class="back-btn" id="backBtn">Close Envelope</button>
            </div>
            
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
