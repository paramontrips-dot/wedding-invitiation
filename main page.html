<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abhinav & Shravani | The Union</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="caricature-container" id="caricaturePreview">
        <img src="caricature.png" alt="Couple Caricature">
    </div>

    <div class="envelope-wrapper" id="envelopeWrapper">
        
        <div class="envelope-front">
            <div class="open-btn" id="openBtn"></div>
        </div>

        <div class="invitation-card">
            <!-- <div class="card-caricature">
                <img src="caricature.png" alt="Couple Caricature">
            </div> -->

            <p class="request-text">Request the honor of your presence</p>

            <h1 class="names">Shraab</h1>
            <span class="ampersand">&</span>
            <h1 class="names">Daab</h1>

            <p class="poetic-invite">
                Together with their families, they invite you to witness the solemn promises of love and devotion.
            </p>

            <div class="details-grid">
                <div class="detail-item"><strong>May 13, 2026</strong></div>
                <div class="detail-divider"></div>
                <div class="detail-item"><strong>Muhurtham: 6 51 AM</strong></div>
            </div>

            <div class="location-suite">
                <strong>Raaga Convention</strong><br>
                Survey No-756, Gandipet, Janwada<br>
                Hyderabad, Telangana 500075
            </div>

            <a href="https://maps.app.goo.gl/ChIJxSEeJ4rryzsRMKk9VLbgcK4" class="map-link" target="_blank">View Location</a>
            <button class="back-btn" id="backBtn">Back to Envelope</button>
            <div class="wax-seal-revealed"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
